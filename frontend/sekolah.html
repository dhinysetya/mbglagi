<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MBG - Daftar Sekolah Binaaan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  </head>
  <body class="bg-[#F8FAFC]">
    <nav
      class="bg-white shadow-sm py-4 px-10 flex justify-between items-center sticky top-0 z-50"
    >
      <div class="flex items-center gap-2">
        <i class="fa-solid fa-shop text-[#113F67] text-2xl"></i>
        <span class="font-bold text-[#113F67] tracking-tight uppercase"
          >Program Nasional MBG</span
        >
      </div>
      <div class="flex gap-8 items-center font-medium text-gray-600">
        <a href="index.html" class="hover:text-[#33A1E0]">Beranda</a>
        <a
          href="sekolah.html"
          class="bg-[#113F67] text-white px-4 py-2 rounded-full text-sm"
          >Sekolah</a
        >
        <a href="dapur.html" class="hover:text-[#33A1E0]">Dapur</a>
        <a href="menu.html" class="hover:text-[#33A1E0]">Menu</a>
        <a href="inventory.html" class="hover:text-[#33A1E0]">Bahan Baku</a>
        <a href="distribusi.html" class="hover:text-[#33A1E0]">Distribusi</a>
      </div>
    </nav>

    <header class="max-w-[1400px] mx-auto mt-10 px-10">
      <div class="flex justify-between items-end">
        <div>
          <h2 class="text-4xl font-black text-[#113F67]">Daftar Sekolah</h2>
          <p class="text-gray-500 mt-2">
            Memantau data sekolah penerima manfaat program Makan Bergizi Gratis.
          </p>
        </div>
        <a
          href="crudSekolah.html"
          class="bg-[#33A1E0] text-white px-6 py-3 rounded-2xl font-bold flex items-center gap-2 hover:bg-[#113F67] transition-all"
        >
          <i class="fa-solid fa-plus"></i> Kelola Data Sekolah
        </a>
      </div>

      <div class="flex gap-4 mt-8">
        <button
          class="bg-[#FFF9AF] text-[#113F67] px-6 py-2 rounded-full font-bold border border-[#113F67]/10"
        >
          Semua Jenjang
        </button>
        <button
          class="bg-white text-gray-400 px-6 py-2 rounded-full font-semibold shadow-sm hover:bg-gray-50"
        >
          SD
        </button>
        <button
          class="bg-white text-gray-400 px-6 py-2 rounded-full font-semibold shadow-sm hover:bg-gray-50"
        >
          SMP
        </button>
        <button
          class="bg-white text-gray-400 px-6 py-2 rounded-full font-semibold shadow-sm hover:bg-gray-50"
        >
          SMA
        </button>
      </div>
    </header>

    <main class="max-w-[1400px] mx-auto p-10">
      <div
        id="sekolah-container"
        class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8"
      >
        <p class="text-gray-400 col-span-full text-center py-20">
          Memuat data sekolah...
        </p>
      </div>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
