version: '3.8'

services:

  service-dapur:
    build: ./service-dapur
    container_name: mbg-service-dapur
    ports:
      - "3001:3001"
    env_file:
      - ./service-dapur/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  service-menu:
    build: ./service-menu
    container_name: mbg-service-menu
    ports:
      - "3002:3002"
    env_file:
      - ./service-menu/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  service-sekolah:
    build: ./service-sekolah
    container_name: mbg-service-sekolah
    ports:
      - "3003:3003"
    env_file:
      - ./service-sekolah/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  service-distribusi:
    build: ./service-distribusi
    container_name: mbg-service-distribusi
    ports:
      - "3005:3005"
    env_file:
      - ./service-distribusi/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always

  service-inventory:
    build: ./service-inventory
    container_name: mbg-service-inventory
    ports:
      - "3004:3004"
    env_file:
      - ./service-inventory/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: always
    
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mbg-frontend
    ports:
      - "5501:5501"
    volumes:
      - ./frontend:/app
    restart: always